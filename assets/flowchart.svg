<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="720" viewBox="0 0 920 720" role="img" aria-label="AutofocusDiscord pipeline">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#b9bbbe"/>
    </marker>
    <style>
      .title { font: 700 22px Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .box { fill: #36393f; stroke: #72767d; stroke-width: 2; rx: 10; }
      .nina { fill: #5865f2; stroke: #4752c4; }
      .discord { fill: #57f287; stroke: #3ba55d; }
      .optional { stroke-dasharray: 6 4; fill: #4f545c; }
      .label { font: 600 14px Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .sublabel { font: 400 12px Segoe UI, Arial, sans-serif; fill: #dcddde; }
      .line { stroke: #b9bbbe; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="920" height="720" fill="#2f3136"/>
  <text x="460" y="36" text-anchor="middle" class="title">AutofocusDiscord pipeline</text>

  <!-- Row 1: NINA -->
  <rect x="310" y="58" width="300" height="44" class="box nina"/>
  <text x="460" y="86" text-anchor="middle" class="label">NINA writes AF JSON</text>

  <line x1="460" y1="102" x2="460" y2="128" class="line"/>

  <!-- Row 2: Watcher -->
  <rect x="250" y="128" width="420" height="52" class="box"/>
  <text x="460" y="152" text-anchor="middle" class="label">Folder watcher</text>
  <text x="460" y="170" text-anchor="middle" class="sublabel">file settle ’ parse ’ ReportStore</text>

  <line x1="460" y1="180" x2="460" y2="210" class="line"/>

  <!-- Row 3: Branch -->
  <rect x="70" y="210" width="340" height="88" class="box"/>
  <text x="240" y="236" text-anchor="middle" class="label">Per-run post (optional)</text>
  <text x="240" y="256" text-anchor="middle" class="sublabel">upload delay ’ quality gate</text>
  <text x="240" y="274" text-anchor="middle" class="sublabel">V-curve PNG ’ Discord</text>

  <rect x="510" y="210" width="340" height="88" class="box"/>
  <text x="680" y="236" text-anchor="middle" class="label">Digest tracking</text>
  <text x="680" y="256" text-anchor="middle" class="sublabel">session + per-sequence lists</text>
  <text x="680" y="274" text-anchor="middle" class="sublabel">Options live graph preview</text>

  <line x1="460" y1="210" x2="240" y2="210" class="line"/>
  <line x1="460" y1="210" x2="680" y2="210" class="line"/>

  <!-- Row 4: Sequence digest -->
  <rect x="170" y="360" width="580" height="72" class="box optional"/>
  <text x="460" y="388" text-anchor="middle" class="label">Sequence digest (sequencer run ends)</text>
  <text x="460" y="408" text-anchor="middle" class="sublabel">wait for last AF JSON + per-run post, then Discord</text>

  <line x1="680" y1="298" x2="680" y2="330" class="line"/>
  <line x1="680" y1="330" x2="460" y2="330" class="line"/>
  <line x1="460" y1="330" x2="460" y2="360" class="line"/>

  <!-- Row 5: Session digest -->
  <rect x="170" y="470" width="580" height="72" class="box optional"/>
  <text x="460" y="498" text-anchor="middle" class="label">Session digest (NINA exit / manual / sequencer instruction)</text>
  <text x="460" y="518" text-anchor="middle" class="sublabel">stats, run list, optional trend chart + disk merge</text>

  <line x1="460" y1="432" x2="460" y2="470" class="line"/>

  <!-- Row 6: Failure -->
  <rect x="170" y="580" width="580" height="56" class="box optional"/>
  <text x="460" y="612" text-anchor="middle" class="label">Live failure post when AF ends without JSON (optional)</text>

  <line x1="240" y1="298" x2="240" y2="608" class="line"/>
  <line x1="240" y1="608" x2="170" y2="608" class="line"/>
</svg>
