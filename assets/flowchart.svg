<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-label="AutoFocusGraphs pipeline">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#b9bbbe"/>
    </marker>
    <style>
      .title { font: 700 14px Segoe UI, Arial, sans-serif; fill: #b9bbbe; }
      .box { fill: #36393f; stroke: #72767d; stroke-width: 2; rx: 8; }
      .nina { fill: #5865f2; stroke: #4752c4; }
      .label { font: 600 12px Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .sub { font: 400 10px Segoe UI, Arial, sans-serif; fill: #b9bbbe; }
      .line { stroke: #b9bbbe; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .sequence { stroke: #57f287; stroke-width: 3; }
      .session { stroke: #9b59b6; stroke-width: 3; }
      .pack { stroke: #3498db; stroke-width: 3; }
      .failure { stroke: #ed4245; stroke-width: 3; }
      .dest { stroke: #57f287; stroke-width: 3; }
      .graph { stroke: #00d4ff; stroke-width: 3; }
      .quality { stroke: #f39c12; stroke-width: 3; }
    </style>
  </defs>
  <rect width="1180" height="520" fill="#2f3136"/>
  <rect x="72" y="28" width="1092" height="476" fill="none" stroke="#72767d" stroke-width="2" rx="12"/>
  <text x="88" y="48" class="title">v0.1.0.2</text>

  <rect x="8" y="208" width="64" height="64" class="box nina"/>
  <text x="40" y="230" text-anchor="middle" class="label">NINA</text>
  <text x="40" y="246" text-anchor="middle" class="label">writes</text>
  <text x="40" y="262" text-anchor="middle" class="label">AF JSON</text>
  <line x1="72" y1="240" x2="88" y2="240" class="line"/>

  <rect x="88" y="212" width="110" height="56" class="box"/>
  <text x="143" y="244" text-anchor="middle" class="label">Folder watcher</text>
  <line x1="198" y1="240" x2="208" y2="240" class="line"/>

  <rect x="208" y="212" width="110" height="56" class="box"/>
  <text x="263" y="236" text-anchor="middle" class="label">File settle</text>
  <text x="263" y="252" text-anchor="middle" class="sub">wait for JSON</text>
  <line x1="318" y1="240" x2="328" y2="240" class="line"/>

  <rect x="328" y="212" width="150" height="56" class="box"/>
  <text x="403" y="236" text-anchor="middle" class="label">Parse + ReportStore</text>
  <text x="403" y="252" text-anchor="middle" class="sub">session + sequence</text>

  <rect x="960" y="48" width="190" height="52" class="box sequence"/>
  <text x="1055" y="70" text-anchor="middle" class="label">Sequence digest</text>
  <text x="1055" y="86" text-anchor="middle" class="sub">at sequence end</text>

  <rect x="960" y="112" width="190" height="52" class="box session"/>
  <text x="1055" y="134" text-anchor="middle" class="label">Session digest</text>
  <text x="1055" y="150" text-anchor="middle" class="sub">NINA exit / this session</text>

  <rect x="960" y="176" width="190" height="52" class="box pack"/>
  <text x="1055" y="198" text-anchor="middle" class="label">AF night pack</text>
  <text x="1055" y="214" text-anchor="middle" class="sub">manual zip / PNG / CSV / JSON</text>

  <rect x="960" y="240" width="190" height="52" class="box failure"/>
  <text x="1055" y="262" text-anchor="middle" class="label">Failure posts</text>
  <text x="1055" y="278" text-anchor="middle" class="sub">bad JSON / live AF</text>

  <path d="M478 240 H514 V74 H960" class="line"/>
  <path d="M514 74 V138 H960" class="line"/>
  <path d="M514 138 V202 H960" class="line"/>
  <path d="M514 202 V266 H960" class="line"/>

  <rect x="328" y="360" width="120" height="56" class="box"/>
  <text x="388" y="384" text-anchor="middle" class="label">Upload delay</text>
  <text x="388" y="400" text-anchor="middle" class="sub">optional</text>
  <path d="M478 240 H514 V388 H328" class="line"/>

  <rect x="468" y="360" width="120" height="56" class="box quality"/>
  <text x="528" y="384" text-anchor="middle" class="label">Quality gate</text>
  <text x="528" y="400" text-anchor="middle" class="sub">R2 / HFR</text>
  <line x1="448" y1="388" x2="468" y2="388" class="line"/>

  <rect x="608" y="360" width="160" height="56" class="box graph"/>
  <text x="688" y="384" text-anchor="middle" class="label">V-curve PNG</text>
  <text x="688" y="400" text-anchor="middle" class="sub">overlays / hints / 2× export</text>
  <line x1="588" y1="388" x2="608" y2="388" class="line"/>

  <rect x="788" y="360" width="362" height="56" class="box dest"/>
  <text x="969" y="378" text-anchor="middle" class="label">Per-run destination post</text>
  <text x="969" y="394" text-anchor="middle" class="sub">Discord / Telegram / Slack / Email</text>
  <text x="969" y="408" text-anchor="middle" class="sub">per-run send · quiet hours</text>
  <line x1="768" y1="388" x2="788" y2="388" class="line"/>
</svg>
